[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "triage"
version = "5.5.3"
description = "Risk modeling and prediction"
readme = "README.md"
license = { text = "MIT License" }
requires-python = ">=3.9"
authors = [
  { name = "Center for Data Science and Public Policy", email = "datascifellows@gmail.com" }
]
keywords = ["triage"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Natural Language :: English",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12"
]
dependencies = [
  "polars==0.18.2",
  "pyarrow>=12.0.1",
  "numpy==1.26.0",
  "pandas==1.5.0",
  "alembic==1.7.7",
  "sqlalchemy==1.3.18",
  "pyyaml==6.0.2",
  "boto3==1.22.4",
  "click==8.1.3",
  "inflection==0.5.1",
  "retrying==1.3.3",
  "dickens==1.0.1",
  "signalled-timeout==1.0.0",
  "wrapt==1.14.0",
  "argcmdr==0.7.0",
  "sqlparse==0.4.4",
  "pebble==4.6.3",
  "adjusttext==0.7.3",
  "graphviz==0.20",
  "requests==2.31.0",
  "loguru==0.7.2",
  "icecream==2.1.3",
  "s3fs==0.4.2",
  "scikit-learn==1.6.1",
  "matplotlib==3.5.1",
  "seaborn==0.11.2",
  "ohio==0.5.0",
  "aequitas==0.42.0",
  "plotly==5.24.0",
  "jupyter==1.0.0",
  "psycopg2-binary>=2.9.11",
]

[project.optional-dependencies]
test = [
  "parsedatetime==2.6",
  "factory_boy==3.2.1",
  "testing.postgresql==1.3.0",
  "pytest==6.2.5",
  "pytest-cov==3.0.0",
  "moto==3.1.7",
  "hypothesis==6.46.1",
  "flake8==4.0.1",
  "codecov==2.1.13",
  "coverage>=4.4",
  "tox>=4.14,<5"
]
docs = [
  "mkdocs==1.6.1",
  "pymdown-extensions==10.8",
  "mkdocs-material==9.4.6",
  "mkdocstrings==0.29.1",
  "mkdocstrings-python==1.16.10"
]
dev = [
  "parsedatetime==2.6",
  "factory_boy==3.2.1",
  "testing.postgresql==1.3.0",
  "pytest==6.2.5",
  "pytest-cov==3.0.0",
  "moto==3.1.7",
  "hypothesis==6.46.1",
  "flake8==4.0.1",
  "codecov==2.1.13",
  "coverage>=4.4",
  "tox>=4.14,<5",
  "mkdocs==1.6.1",
  "pymdown-extensions==10.8",
  "mkdocs-material==9.4.6",
  "mkdocstrings==0.29.1",
  "mkdocstrings-python==1.16.10",
  "black==22.3.0",
  "bumpversion==0.6.0",
  "wheel==0.38.2"
]

[project.urls]
Documentation = "https://dssg.github.io/triage/"
"Source Code" = "https://github.com/dssg/triage"
Tutorial = "https://dssg.github.io/triage/dirtyduck/"

[project.scripts]
triage = "triage.cli:execute"

[tool.flake8]
exclude = ["docs"]
max-line-length = 88

[tool.pycodestyle]
max-line-length = 88
statistics = true

[tool.uv]
dev-dependencies = ["triage[dev]"]

[tool.uv.sources]
triage = { workspace = true }

[tool.hatch.build]
exclude = ["src/tests"]

[tool.hatch.build.sources]
triage = "src/triage"

[tool.hatch.build.targets.wheel]
packages = ["triage"]

[tool.hatch.build.targets.sdist]
include = [
  "AUTHORS.rst",
  "CONTRIBUTING.md",
  "HISTORY.rst",
  "LICENSE",
  "MANIFEST.in",
  "README.md",
  "docs",
  "dirtyduck",
  "example",
  "manage.py",
  "pyproject.toml",
  "src"
]

[tool.tox]
requires = ["tox>=4.14"]
env_list = ["py3"]

[tool.tox.env.py3]
description = "Run the unit test suite with coverage"
deps = [
  ".[test]"
]
commands = [
  "pytest --basetemp={envtmpdir} {posargs:-vvv --cov=triage}"
]

[tool.tox.env.py3.set_env]
AWS_ACCESS_KEY_ID = "fake"
AWS_SECRET_ACCESS_KEY = "fake"
BOTO_CONFIG = "/dev/null"
